{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ SITE_NAME }} — Shop ERP &amp; POS{% endblock %}</title>
    <meta
      name="description"
      content="{% block meta_description %}{{ SITE_TAGLINE }}{% endblock %}"
    />

    <!-- Standard favicon -->
    <link rel="icon" type="image/x-icon" href="{% static 'landing/img/favicon.ico' %}">

    <!-- SVG (modern browsers) -->
    <!-- <link rel="icon" type="image/svg+xml" href="/favicon.svg"> -->

    <!-- PNG fallback -->
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'landing/img/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'landing/img/favicon-16x16.png' %}">

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'landing/img/apple-touch-icon.png' %}">

    <!-- Android / PWA -->
    <link rel="manifest" href="{% static 'landing/img/site.webmanifest' %}">

    <!-- Theme color (browser UI color) -->
    <meta name="theme-color" content="#e0882a">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="{% static 'landing/css/styles.css' %}" />
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    {% block body %}{% endblock %}
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="{% static 'landing/js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
